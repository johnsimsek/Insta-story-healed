<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Story Viewer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body{
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
  overflow:hidden;
}

/* BLUR BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(25px) brightness(0.6);
  transform:scale(1.2);
  z-index:0;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:12px;
  display:flex;
  justify-content:flex-end;
  z-index:30;
  pointer-events:none;
}
.close{
  pointer-events:auto;
  border:0;
  border-radius:999px;
  padding:10px 12px;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:14px;
  line-height:1;
  cursor:pointer;
}

/* PROGRESS BAR */
.progress{
  position:fixed;
  top:54px;
  left:10px;
  right:10px;
  display:flex;
  gap:5px;
  z-index:25;
}
.progress span{
  flex:1;
  height:3px;
  background:rgba(255,255,255,.3);
  overflow:hidden;
}
.progress span.active::after{
  content:"";
  display:block;
  height:100%;
  width:0%;
  background:#fff;
  animation:fill 5s linear forwards;
}
@keyframes fill{ to{width:100%} }

/* STORY CONTAINER 9:16 */
.story{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
  padding: 72px 12px 12px; /* topbar+progress için */
}

.viewer{
  width:min(420px, 92vw);
  aspect-ratio: 9 / 16;
  max-height: calc(100vh - 90px);
  border-radius:16px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.viewer img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

/* TAP AREAS */
.tap{
  position:fixed;
  top:0;
  bottom:0;
  width:50%;
  z-index:20;
}
.tap.left{left:0}
.tap.right{right:0}
</style>
</head>

<body>
<div class="bg" id="bg"></div>

<div class="topbar">
  <button class="close" id="closeBtn" aria-label="Kapat">✕</button>
</div>

<div class="progress" id="progress"></div>

<div class="story">
  <div class="viewer">
    <img id="storyImage" src="" alt="">
  </div>
</div>

<div class="tap left"></div>
<div class="tap right"></div>

<script>
const BASE_PATH = "";
const EXTENSIONS = ["jpg","jpeg","png","webp"];
const MAX_MISSES_IN_A_ROW = 3;
const HARD_LIMIT = 500;

const images = [];
let detectIndex = 1;
let misses = 0;

let index = 0;
let timer;

const img = document.getElementById("storyImage");
const bg  = document.getElementById("bg");
const progress = document.getElementById("progress");
const closeBtn = document.getElementById("closeBtn");

function tryLoadOne(i, extIdx = 0){
  if (i > HARD_LIMIT) return startViewerOrError();

  if (extIdx >= EXTENSIONS.length) {
    misses++;
    if (images.length === 0 && i === 1) return startViewerOrError();
    if (misses >= MAX_MISSES_IN_A_ROW) return startViewerOrError();
    detectIndex++;
    return tryLoadOne(detectIndex, 0);
  }

  const file = `${BASE_PATH}story${i}.${EXTENSIONS[extIdx]}`;
  const test = new Image();

  test.onload = () => {
    images.push(file);
    misses = 0;
    detectIndex++;
    tryLoadOne(detectIndex, 0);
  };

  test.onerror = () => tryLoadOne(i, extIdx + 1);
  test.src = file;
}

function startViewerOrError(){
  if (images.length > 0) return showStory(0);
  alert(
    "Resim bulunamadı!\n\n" +
    "Kontrol:\n" +
    "1) story1.jpg/png var mı?\n" +
    "2) Aynı klasörde mi? Değilse BASE_PATH ayarla.\n" +
    "3) Sunucudan aç (GitHub Pages / Live Server)."
  );
}

function renderProgress(){
  progress.innerHTML = "";
  images.forEach((_, i) => {
    const bar = document.createElement("span");
    if (i < index) bar.style.background = "#fff";
    if (i === index) bar.classList.add("active");
    progress.appendChild(bar);
  });
}

function showStory(i){
  clearTimeout(timer);
  index = (i + images.length) % images.length;
  img.src = images[index];
  bg.style.backgroundImage = `url(${images[index]})`;
  renderProgress();
  timer = setTimeout(() => showStory(index + 1), 5000);
}

document.querySelector(".tap.right").onclick = () => showStory(index + 1);
document.querySelector(".tap.left").onclick  = () => showStory(index - 1);

closeBtn.onclick = () => {
  // yeni sekme ise kapatmayı dene, olmazsa geri git
  window.close();
  setTimeout(() => history.back(), 50);
};

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeBtn.click();
});

tryLoadOne(detectIndex);
</script>
</body>
</html>
